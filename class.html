<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>English Course Section</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      direction: rtl;
    }

    .english-section {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      padding: 40px 30px;
      max-width: 700px;
      margin: 50px auto;
      transition: transform 0.3s ease;
    }

    .english-section:hover {
      transform: translateY(-5px);
    }

    .english-section h2 {
      text-align: center;
      color: #333;
      font-size: 1.8rem;
      margin-bottom: 30px;
    }

    .features-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .features-list li {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 1rem;
      padding: 12px 0;
      border-bottom: 1px solid #eaeaea;
      transition: color 0.3s ease;
    }

    .features-list li:last-child {
      border-bottom: none;
    }

    .features-list li i {
      color: #48A6A7;
      font-size: 1.3rem;
      transition: transform 0.3s ease;
    }

    .features-list li:hover i {
      transform: scale(1.3) rotate(10deg);
      color: #2f7e7e;
    }

    .cta-button {
      text-align: center;
      margin-top: 30px;
    }

    .cta-button a {
      position: relative;
      display: inline-block;
      background: linear-gradient(135deg, #48A6A7, #2f7e7e);
      color: #fff;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 8px 15px rgba(72, 166, 167, 0.3);
      text-decoration: none;
    }

    .cta-button a::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 300%;
      height: 300%;
      background: rgba(255, 255, 255, 0.08);
      transition: all 0.6s ease;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
    }

    .cta-button a:hover::before {
      transform: translate(-50%, -50%) scale(1);
    }

    .cta-button a:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 25px rgba(47, 126, 126, 0.4);
    }

    @media (max-width: 768px) {
      .english-section {
        padding: 30px 20px;
      }

      .english-section h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="english-section">
    <h2>آموزش زبان انگلیسی</h2>
    <ul class="features-list">
      <li><i class="fas fa-clock"></i> جلسات ۴۰ دقیقه‌ای</li>
      <li><i class="fas fa-chalkboard-teacher"></i> استادهای مجرب</li>
      <li><i class="fas fa-book-open"></i> دسترسی به منابع آموزشی ویژه</li>
      <li><i class="fas fa-users"></i> عضویت در گروپ و مسابقات آموزشی</li>
      <li><i class="fas fa-certificate"></i> سرتفکیت معتبر در پایان دوره</li>
    </ul>
    <div class="cta-button">
      <a href="#">ثبت‌نام ۱۰۰$</a>
    </div>
  </div>

</body>
</html>
